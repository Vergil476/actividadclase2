name: CI Project Validation
on:
  push:
    branches: [ main, develop ]

jobs:
  validate-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Verify file structure
        run: ls README.md setup_project.sh project_report.py docker-compose.yml infraestructura-base.yaml app/Dockerfile helper/Dockerfile

  simulate-pipeline:
    runs-on: ubuntu-latest
    needs: validate-files
    steps:
      - name: Source
        run: echo "Etapa Source: Código obtenido."
      - name: Build
        run: echo "Etapa Build: Simulando creación de imágenes."
      - name: Validate
        run: python3 project_report.py
      - name: Ready for Deploy
        run: echo "Etapa Ready for Deploy: Validación exitosa."
